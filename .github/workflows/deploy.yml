
name: Zabbix Host Deployment

on:
  push:
    branches:
      - main

jobs:

  add-hosts:
    runs-on: self-hosted

    env:
      ZABBIX_URL: ${{ secrets.ZABBIX_URL }}
      ZABBIX_TOKEN: ${{ secrets.ZABBIX_TOKEN }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pandas python3-openpyxl

      - name: Execute bulk onboarding
        run: |
          python3 scripts/bulk_host_executor.py inventory/hosts.csv

  install-agent:

    runs-on: self-hosted
    needs: add-hosts

    env:
      PEM_FILE: zbx_srv1.pem
      REMOTE_USER: ubuntu
      SCRIPT_LOCAL: zabbix_agent_add.sh
      SCRIPT_REMOTE: /home/ubuntu/zabbix_agent_add.sh

    steps:

      - uses: actions/checkout@v3

      - name: Extract agent hosts
        run: |
          python3 << 'EOF' > agent_hosts.txt
          import pandas as pd

          df = pd.read_csv("inventory/hosts.csv")

          for _, row in df.iterrows():
              if str(row["Type"]) == "1":
                  print(f"{row['Hostname']},{row['IP']}")
          EOF

      - name: Debug hosts
        run: cat agent_hosts.txt

      # - name: Install agents
      #   run: |
      #     while IFS=',' read -r hostname ip
      #     do
      #       echo "--- $ip ($hostname): OS Version ---"

      #       ssh -o StrictHostKeyChecking=no -i "$PEM_FILE" "$REMOTE_USER@$ip" "cat /etc/os-release" || echo "SSH check failed"

      #       echo "📦 Copying $SCRIPT_LOCAL..."
      #       scp -o StrictHostKeyChecking=no -i "$PEM_FILE" "$SCRIPT_LOCAL" "$REMOTE_USER@$ip:$SCRIPT_REMOTE"

      #       echo "🚀 Running agent install..."
      #       ssh -o StrictHostKeyChecking=no -i "$PEM_FILE" "$REMOTE_USER@$ip" "bash $SCRIPT_REMOTE"

      #       echo "Finished agent steps for $hostname ($ip)"

      #     done < agent_hosts.txt
      - name: Install agents
        run: |
          while IFS=',' read -r hostname ip
          do
            echo "--------------------------------"
            echo "Processing host: $hostname ($ip)"

            echo "Checking SSH connectivity..."

            ssh -o ConnectTimeout=10 \
                -o StrictHostKeyChecking=no \
                -i "$PEM_FILE" \
                "$REMOTE_USER@$ip" "cat /etc/os-release" 2>&1

            if [ $? -ne 0 ]; then
              echo "❌ SSH connection failed for $hostname ($ip)"
              echo "Skipping host..."
              continue
            fi

            echo "📦 Copying $SCRIPT_LOCAL..."
            scp -o ConnectTimeout=10 \
                -o StrictHostKeyChecking=no \
                -i "$PEM_FILE" \
                "$SCRIPT_LOCAL" \
                "$REMOTE_USER@$ip:$SCRIPT_REMOTE" 2>&1

            echo "🚀 Running agent install..."
            ssh -o StrictHostKeyChecking=no \
                -i "$PEM_FILE" \
                "$REMOTE_USER@$ip" "bash $SCRIPT_REMOTE" 2>&1

            echo "✅ Finished agent steps for $hostname ($ip)"

          done < agent_hosts.txt